name: aimj
description: AI短剧 APP - 对标红果短剧的 MVP 客户端
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 路由
  go_router: ^14.2.0

  # 网络
  dio: ^5.5.0

  # 图片
  cached_network_image: ^3.3.1

  # 视频
  video_player: ^2.9.1
  chewie: ^1.8.3

  # 适配
  flutter_screenutil: ^5.9.3

  # 工具
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
